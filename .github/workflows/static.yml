name: Build static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: static-site
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Vite entrypoint
        run: cp index.source.html index.html

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Publish build to repository root
        run: |
          rm -rf assets
          cp -R dist/. .
          remote_head="$(git ls-remote origin refs/heads/main | cut -f1)"
          local_head="$(git rev-parse HEAD)"
          if [ "$remote_head" != "$local_head" ]; then
            echo "main advanced from $local_head to $remote_head during build; skipping stale publish."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html 404.html assets favicon.svg robots.txt sitemap.xml _redirects CNAME
          if git diff --cached --quiet; then
            echo "No static build changes to publish."
            exit 0
          fi
          git commit -m "Build static site"
          git push origin HEAD:main
