name: Build static site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: static-site
  cancel-in-progress: false

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare Vite entrypoint
        run: cp index.source.html index.html

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Publish build to repository root
        run: |
          rm -rf assets
          cp -R dist/. .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets favicon.svg robots.txt sitemap.xml _redirects CNAME
          git diff --cached --quiet || git commit -m "Build static site"
          git push
